name: Build DEB package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release with DEB package'
        required: false
        default: false
        type: boolean

jobs:
  build-debian12:
    runs-on: debian12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake libfmt-dev nlohmann-json3-dev dpkg-dev

      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Package DEB
        run: |
          cd build
          cpack -G DEB

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tsg-billing-deb
          path: |
            build/*.deb
            build/Version
          retention-days: 7

  release:
    needs: build-debian12
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
    runs-on: debian12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: tsg-billing-deb
          path: artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(cat artifacts/Version)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: TSG billing v${{ steps.version.outputs.VERSION }}
          files: artifacts/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}